syntax = "proto3";

package main;

option go_package = "./proto";

message Phrase {
    string text = 1;
}

message Rank{
    string date = 1;
    int32  rank = 2; 
    int32  paidRank = 3;
}

message KeyPhrase {
    Phrase phrase = 1;
    repeated Rank ranks = 2;
}

message RankingResp {
    string token = 1;
    repeated KeyPhrase keyPhrases = 2; 
}

message AddPhrasesReq {
    string token = 1;
    repeated Phrase phrases = 2;
}




